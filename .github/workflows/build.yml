name: build-release

on:
  push:
    branches:
      - main

# Every job skips itself when the triggering commit is the bot's version-bump
# commit (identified by the "chore: bump version" prefix), which prevents the
# workflow from re-entering itself after the bump-version job pushes to main.

jobs:
  create-release:
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read workspace version
        id: version
        run: |
          version=$(grep -m1 '^version = "[0-9]' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true

  build:
    needs: create-release
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    env:
      RELEASE_CHANNEL: stable
      ZQLZ_VERSION: ${{ needs.create-release.outputs.version }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            architecture: x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            architecture: aarch64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            architecture: x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gettext-base \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev

      - name: Install Windows packaging dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Make bundle scripts executable
        if: runner.os != 'Windows'
        shell: bash
        run: chmod +x script/bundle-mac script/bundle-linux

      - name: Build Linux bundle
        if: runner.os == 'Linux'
        shell: bash
        run: ./script/bundle-linux "${{ matrix.target }}"

      - name: Build macOS bundle
        if: runner.os == 'macOS'
        shell: bash
        run: ./script/bundle-mac "${{ matrix.target }}"

      - name: Build Windows bundle
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\script\bundle-windows.ps1 -Architecture ${{ matrix.architecture }} -Channel stable

      - name: Collect Linux release artifacts
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p artifacts
          cp "target/${{ matrix.target }}/release/zqlz-linux-${{ matrix.architecture }}.tar.gz" artifacts/

      - name: Collect macOS release artifacts
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p artifacts
          cp "target/${{ matrix.target }}/release/ZQLZ-${{ matrix.architecture }}.dmg" artifacts/
          ditto -c -k --keepParent \
            "target/${{ matrix.target }}/release/bundle/ZQLZ.app" \
            "artifacts/ZQLZ-${{ matrix.architecture }}.app.zip"

      - name: Collect Windows release artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Get-ChildItem "target/${{ matrix.target }}/release/ZQLZ-${{ matrix.architecture }}.*" |
            Copy-Item -Destination artifacts

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: artifacts/*

  # Runs after every platform build succeeds. Bumps the patch version in
  # Cargo.toml and pushes it directly to main so the next PR starts from the
  # correct base version without any manual intervention.
  #
  # The commit uses the GITHUB_TOKEN bot identity. GitHub Actions does not
  # re-trigger workflows for pushes made with GITHUB_TOKEN, so there is no
  # infinite loop — the guard above is a belt-and-suspenders measure.
  bump-version:
    needs: build
    if: >-
      !startsWith(github.event.head_commit.message, 'chore: bump version') &&
      needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch the tip of main at job start so concurrent pushes don't cause
          # a non-fast-forward rejection.
          ref: main

      - name: Bump patch version
        id: bump
        run: |
          current=$(grep -m1 '^version = "[0-9]' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          IFS='.' read -r major minor patch <<< "$current"
          new="${major}.${minor}.$((patch + 1))"
          awk -v old="$current" -v new="$new" '
            !done && /^version = "/ && index($0, old) { sub(old, new); done=1 }
            { print }
          ' Cargo.toml > Cargo.toml.tmp && mv Cargo.toml.tmp Cargo.toml
          echo "previous=$current" >> "$GITHUB_OUTPUT"
          echo "version=$new" >> "$GITHUB_OUTPUT"

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"
          git push origin main
