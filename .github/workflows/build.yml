name: build-release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (format: vX.Y.Z). Required when running from a branch ref."
        required: false
        type: string

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.release_tag.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve release tag
        id: release_tag
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ github.event.inputs.tag }}"
          fi

          if [[ -z "$tag" ]]; then
            echo "No release tag provided. Run workflow on a tag ref or pass the 'tag' input." >&2
            exit 1
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag '$tag'. Expected format vX.Y.Z" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.release_tag.outputs.tag }}

      - name: Read and validate workspace version
        id: version
        run: |
          expected_version="${{ steps.release_tag.outputs.tag }}"
          expected_version="${expected_version#v}"

          workspace_version=$(grep -m1 '^version = "[0-9]' Cargo.toml | sed 's/version = "\(.*\)"/\1/')

          if [[ -z "$workspace_version" ]]; then
            echo "Could not read workspace version from Cargo.toml" >&2
            exit 1
          fi

          if [[ "$workspace_version" != "$expected_version" ]]; then
            echo "Tag version ($expected_version) does not match Cargo.toml workspace version ($workspace_version)." >&2
            exit 1
          fi

          echo "version=$workspace_version" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true

  build:
    needs: create-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    env:
      RELEASE_CHANNEL: stable
      ZQLZ_VERSION: ${{ needs.create-release.outputs.version }}
      CARGO_INCREMENTAL: 0

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            architecture: x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            architecture: aarch64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            architecture: x86_64

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release.outputs.tag }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gettext-base \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev

      - name: Install Windows packaging dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Cache Rust dependencies and build output
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ runner.os }}-${{ matrix.target }}
          shared-key: zqlz-release-build
          cache-directories: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
            ~/.cargo/git/checkouts
            C:\Users\runneradmin\AppData\Local\cargo\registry\cache
            C:\Users\runneradmin\AppData\Local\cargo\registry\index
            C:\Users\runneradmin\AppData\Local\cargo\git\db
            C:\Users\runneradmin\AppData\Local\cargo\git\checkouts
          cache-on-failure: true

      - name: Make bundle scripts executable
        if: runner.os != 'Windows'
        shell: bash
        run: chmod +x script/bundle-mac script/bundle-linux

      - name: Build Linux bundle
        if: runner.os == 'Linux'
        shell: bash
        run: ./script/bundle-linux "${{ matrix.target }}"

      - name: Build macOS bundle
        if: runner.os == 'macOS'
        shell: bash
        run: ./script/bundle-mac "${{ matrix.target }}"

      - name: Build Windows bundle
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\script\bundle-windows.ps1 -Architecture ${{ matrix.architecture }} -Channel stable

      - name: Collect Linux release artifacts
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p artifacts
          cp "target/${{ matrix.target }}/release/zqlz-linux-${{ matrix.architecture }}.tar.gz" artifacts/

      - name: Collect macOS release artifacts
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p artifacts
          cp "target/${{ matrix.target }}/release/ZQLZ-${{ matrix.architecture }}.dmg" artifacts/
          ditto -c -k --keepParent \
            "target/${{ matrix.target }}/release/bundle/ZQLZ.app" \
            "artifacts/ZQLZ-${{ matrix.architecture }}.app.zip"

      - name: Collect Windows release artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Get-ChildItem "target/${{ matrix.target }}/release/ZQLZ-${{ matrix.architecture }}.*" |
            Copy-Item -Destination artifacts

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: artifacts/*
