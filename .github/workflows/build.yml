name: build-release

on:
  push:
    branches:
      - main

# Every job skips itself when the triggering commit is the bot's version-bump
# commit (identified by the "chore: bump version" prefix), which prevents the
# workflow from re-entering itself after the bump-version job pushes to main.

jobs:
  create-release:
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read workspace version
        id: version
        run: |
          version=$(grep -m1 '^version = "[0-9]' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true

  build:
    needs: create-release
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

          - os: macos-latest
            target: aarch64-apple-darwin

          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifacts
        shell: bash
        run: |
          BIN=zqlz
          mkdir -p artifacts

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp target/${{ matrix.target }}/release/${BIN}.exe \
               artifacts/${BIN}-${{ matrix.target }}.exe
          else
            cp target/${{ matrix.target }}/release/${BIN} \
               artifacts/${BIN}-${{ matrix.target }}

            chmod +x artifacts/${BIN}-${{ matrix.target }}

            tar -czf artifacts/${BIN}-${{ matrix.target }}.tar.gz \
              -C artifacts ${BIN}-${{ matrix.target }}

            zip -j artifacts/${BIN}-${{ matrix.target }}.zip \
              artifacts/${BIN}-${{ matrix.target }}
          fi

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: artifacts/*

  # Runs after every platform build succeeds. Bumps the patch version in
  # Cargo.toml and pushes it directly to main so the next PR starts from the
  # correct base version without any manual intervention.
  #
  # The commit uses the GITHUB_TOKEN bot identity. GitHub Actions does not
  # re-trigger workflows for pushes made with GITHUB_TOKEN, so there is no
  # infinite loop — the guard above is a belt-and-suspenders measure.
  bump-version:
    needs: build
    if: >-
      !startsWith(github.event.head_commit.message, 'chore: bump version') &&
      needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch the tip of main at job start so concurrent pushes don't cause
          # a non-fast-forward rejection.
          ref: main

      - name: Bump patch version
        id: bump
        run: |
          current=$(grep -m1 '^version = "[0-9]' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          IFS='.' read -r major minor patch <<< "$current"
          new="${major}.${minor}.$((patch + 1))"
          awk -v old="$current" -v new="$new" '
            !done && /^version = "/ && index($0, old) { sub(old, new); done=1 }
            { print }
          ' Cargo.toml > Cargo.toml.tmp && mv Cargo.toml.tmp Cargo.toml
          echo "previous=$current" >> "$GITHUB_OUTPUT"
          echo "version=$new" >> "$GITHUB_OUTPUT"

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }}"
          git push origin main
