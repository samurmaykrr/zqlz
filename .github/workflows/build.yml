name: build-release

on:
  push:
    branches:
      - main

jobs:
  # Reads the workspace version from Cargo.toml, creates (or updates) the
  # GitHub Release for that version tag, and passes the version string to the
  # build jobs so they all upload to the same release without racing.
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read workspace version
        id: version
        run: |
          version=$(grep -m1 '^version = "[0-9]' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true

  build:
    needs: create-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

          - os: macos-latest
            target: aarch64-apple-darwin

          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifacts
        shell: bash
        run: |
          BIN=zqlz
          mkdir -p artifacts

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp target/${{ matrix.target }}/release/${BIN}.exe \
               artifacts/${BIN}-${{ matrix.target }}.exe
          else
            cp target/${{ matrix.target }}/release/${BIN} \
               artifacts/${BIN}-${{ matrix.target }}

            chmod +x artifacts/${BIN}-${{ matrix.target }}

            tar -czf artifacts/${BIN}-${{ matrix.target }}.tar.gz \
              -C artifacts ${BIN}-${{ matrix.target }}

            zip -j artifacts/${BIN}-${{ matrix.target }}.zip \
              artifacts/${BIN}-${{ matrix.target }}
          fi

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          files: artifacts/*
